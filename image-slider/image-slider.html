<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGE SLIDER</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background-color: rgba(41, 33, 33);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: stretch;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  width: 100%;
  max-width: 800px;
  margin: auto;
}

.slider {
  position: relative;
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  margin-top: 40px;
  max-width: 800px;
}

.slides {
  display: flex;
  transition: transform 0.5s ease-in-out;
   height: 100%; /* Force height of all slides */
}

.slide {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  display: none;
  object-fit: contain;
  border: 5px solid white;
  max-height: 100%;
  background-color: black;
}

.slide.active {
  display: block;
}

.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  background: rgba(0, 0, 0, 0.3);
  color: #fff;
  border: none;
  cursor: pointer;
  padding: 10px;
  z-index: 10;
}

.prev { left: 4px; }
.next { right: 4px; }

#upload {
  width: fit-content;
  margin-bottom: 10px;
  color: white;
  background: rgba(255,255,255,0.05);
  border: 1px solid white;
  border-radius: 8px;
  cursor: pointer;
}

@media (max-width: 500px) {
  .btn {
    font-size: 1.5rem;
    padding: 6px;
  }

  .slide {
    border-width: 3px;
  }
}


</style>
</head>
<body>

<div class="container">
  <div class="slider">
    <button type="button" class="btn prev">⟨</button>
    
    <div class="slides">
      <img src="img/img1.jpg" class="slide active" alt="Image 1">
      <img src="img/img2.jpg" class="slide" alt="Image 2">
      <img src="img/img3.jpg" class="slide" alt="Image 3">
    </div>
    

    <button class="btn next">⟩</button>
  </div>




<input placeholder="Upload Image" type="file" id="upload" class="inp" accept="image/*" multiple>
</div>

    <script>
      
const slidesContainer = document.querySelector('.slides');
const uploadInput = document.getElementById('upload');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');



let currentSlide = 0;
let uploadedImages = [];
let maxImages = 100;

let defaultImages = [
  'img/img1.jpg',
  'img/img2.jpg',
  'img/img3.jpg'
];


let activeImages = [...defaultImages]; 

function renderSlides(){
      slidesContainer.innerHTML = "";

activeImages.forEach((src, index) => {

const img =  document.createElement('img');
 img.src = typeof src === 'string' ? src : URL.createObjectURL(src);
  img.classList.add('slide');
   if (index === currentSlide) img.classList.add('active');
  img.alt = `Image ${index + 1}`;
  slidesContainer.appendChild(img);
});

};

function showSlide(index) {
  const total = activeImages.length;
  currentSlide = (index + total) % total;
  document.querySelectorAll('.slide').forEach((slide, i) => {
    slide.classList.toggle('active', i === currentSlide);
  });
}

prevBtn.addEventListener('click' , () => showSlide(currentSlide - 1));

nextBtn.addEventListener('click' , () => showSlide(currentSlide + 1));


uploadInput.addEventListener('change', (event) =>{

const files = Array.from(event.target.files);
if (files.length + uploadedImages.length > maxImages){
  alert(`Maximum upload limit is ${maxImages} images.`);
    return;
};

uploadedImages.push(...files);
activeImages = [...uploadedImages];
currentSlide = 0 ;
renderSlides();

});


    </script>
</body>
</html>
