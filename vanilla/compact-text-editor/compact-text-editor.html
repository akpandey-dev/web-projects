<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Text Editor</title>
<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background: white;
    display:flex;
    flex-direction:column;
    align-items: center;
    height:100vh;
    border: 2px solid #007bff;
}

.container{
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

.heading-container{
    align-self: center;
    justify-self: center;
    color: #007bff;
    font-size: clamp(0.8rem, 3vw, 1.5rem);
}

#format-tab-title{
      border-style: solid;
      margin-top: 5px;
      margin-bottom: 5px;
      background-color: #007bff;
}

.toolbar, .format-tab{
    width:100%;
    justify-items: center;
    padding: 1%;

}



.toolbar-options, .format-options{
    display:flex;
    gap:8px;
    padding:1%;
    width: 50vw;
    border-bottom:1px solid #ccc;
    border: solid;
    background: #007bff;
    align-items: center;
    justify-content:center;
    overflow-x: auto;
    scrollbar-width: thin;
    scroll-behavior:smooth;
    background-color: #007bff;
}

.toolbar button, .format-tab button{
    cursor:pointer;
    width: 10vw;
    height: 4vh;
    text-align: center;
    background-color: black;
    color: #f9f9f9;
}

.toolbar button:hover, .format-tab button:hover{
    background:#656262;
}

.editor{
      overflow: auto;
      resize: none;
      width: 80vw;
      max-width: 1000px;
      height: 55vh;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background-color: #f9f9f9;
      border: 8px solid #555;
      border-radius: 20px;
      text-align: left;
      color: black;
      justify-self: center;
      align-self: center;
}

#download-button{
  position: fixed;
  bottom: 20px;
  right: 10px;
  padding: 5px 5px;
  font-size: 15px;
  border-radius: 50%;
  background-color: #4caf50;
  color: white;
  border: none;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

    #counter-box {
      text-align: left;
      justify-self: center;
      align-self: center;
      display: flex;
    }

    #word-counter {
      width: 24vw;
      align-items: baseline;
      margin-top: 5px;
      border:2px solid gray;
      background-color: #007bff;
      text-align: center;
      margin-right: 1vw;
    }

    #char-counter {
      width: 24vw;
      align-items: baseline;
      margin-top: 5px;
      border:2px solid gray;
      background-color: #007bff;
      text-align: center;
      margin-left: 1vw;
    }

    .font-control-bar {
      position: absolute;
      top: 55%;
      right: 0px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 9999;
      padding: 0px;
    }

    .font-control-bar input[type="range"],
    .font-control-bar input[type="color"] {
      writing-mode: vertical-lr;
      width: 20px;
      height: 4%px;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .font-color-changer {
      border-radius: 50%;
      width: 20px;
      height: 20px;
      border-style: none;
      margin: 0 0;
      position: sticky;
    }

    .font-size-changer {
      transform: rotate(180deg);
    }

    .font-family{
      margin: 2px;
      padding: 3px;
      width: 50%;
      background-color: #007bff;
      border-style: solid;
      text-align: left;
      justify-self: center;
      align-self: center;
    }


</style>
</head>
<body>

<div class="container">
    <div class="heading-container">
      <h1>Compact Text Editor</h1>
    </div>

<div class="format-tab" id="format-tab" title="Format Tab">
<div id="format-tab-title">Format Tab</div>
    <div class="format-options" id="format-options">
        <button type="button" onclick="format('b')" title="Bold"><b>B</b></button>
        <button type="button" onclick="format('i')" title="Italics"><i>I</i></button>
        <button type="button" onclick="format('u')" title="Underline"><u>U</u></button>
        <button type="button" onclick="format('s')" title="Strikethrough"><s>A</s></button>
        <button type="button" onclick="format('mark')" title="Mark"><mark>A</mark></button>
        <button type="button" onclick="format('code')" title="Code"><code>A</code></button>
        <button type="button" onclick="format('sup')" title="Supscript"><sup>A</sup></button>
        <button type="button" onclick="format('sub')" title="Subscript"><sub>A</sub></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">
    
</div>

<div class="toolbar" id="toolbar" title="Toolbar">
    <div class="toolbar-options" id="toolbar-options">
        <button type="button" onclick="rightAlign()" title="Right Align">➡️</button>
        <button type="button" onclick="leftAlign()" title="Left Align">⬅️</button>
        <button type="button" onclick="centerAlign()" title="Center Align">⬆️</button>
        <button type="button" onclick="justify()" title="Justify">⬇️</button>
        <button type="button" onclick="lineBreak()" title="Line Break">↩️</button>
        <button type="button" onclick="clearFormat()" title="Clear Formatting">✖️</button>
        <button type="button" onclick="clearEditor()" title="Clear Editor">❌</button>
        <button type="button" onclick="backSpaceFun()" title="Backspace">⌫</button>
    </div>
</div>

  <div class="font-family">
    <select title="Select font family" id="fontFamily" class="font-family">
      <option value="inherit">Default</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Verdana">Verdana</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="monospace">Monospace</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="fantasy">Fantasy</option>
      <option value="cursive">Cursive</option>
      <option value="gill-sans">Gill-sans</option>
    </select>
  </div>

<div id="counter-box">
    <input id="word-counter" placeholder="WORDS HERE" title="Word Counter" disabled />
    <input id="char-counter" placeholder="CHARCATERS HERE" title="Character Counter" disabled />
</div>

  <div class="font-control-bar">
    <input type="color" title="Font Color" class="font-color-changer" placeholder="Color" id="font-color-changer" />
    <input type="range" title="Font Size" class="font-size-changer" placeholder="Font Size" min="8" max="72" value="16" step="1" id="font-size-changer" />
  </div>

<button id="download-button" onclick="saveFile()" title="Download as HTML">💾</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/akpandey-dev/text-editor@main/src/script.js"></script>

</body>
</html>
