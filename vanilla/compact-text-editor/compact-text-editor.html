<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact Text Editor</title>
<style>

:root{
    --ui-background: #e9e3e3;
    --ui-panel: #f0f0f0;

    --ui-accent: #007bff;

    --ui-text: #000;
    --ui-border: #555;
    --ui-border-light: #ccc;

    --ui-btn-bg: #c4e388;
    --ui-btn-hover: #b3d36f;

    --ui-editor-bg: #f0f0f0;

    --ui-shadow: rgba(0,0,0,0.3);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
      position: relative;
      height: auto;
      font-family: Arial, sans-serif;
      padding: 5px;
      min-height: 95vh;
      overflow-y: scroll;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      margin: 0;
      height: 100vh;
      width:100vw;
      overflow-x: hidden;
      scrollbar-width: none;
      background: var(--ui-background);
      color: var(--ui-text);
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
  display: none;
}

.container{
      text-align: left;
      justify-self: center;
      align-self: center;
      margin: 0;
      padding: 0;
}

.heading-container{
    align-self: center;
    justify-self: center;
    color: var(--ui-accent);
    font-size: clamp(0.8rem, 3vw, 1.5rem);
}

#format-tab-title{
      border-style: solid;
      border-color: var(--ui-border);
      margin-top: 5px;
      margin-bottom: 5px;
      background-color: var(--ui-panel);
      color: var(--ui-text);
      padding: 4px;
}

.toolbar,
.format-tab{
    width:100%;
    justify-items:center;
    padding:1%;
}

.toolbar-options,
.format-options{
    display:flex;
    gap:4px;
    padding:1%;
    border:1px solid var(--ui-border);
    background: var(--ui-panel);
    align-items:center;
    justify-content:center;
}

.toolbar button,
.format-tab button{
    width:7vw;
    height:4vh;
    padding:4px;
    text-align:center;
    background-color: var(--ui-btn-bg);
    color: var(--ui-text);
    border:1px solid var(--ui-border);
    font-size:x-small;
    cursor:pointer;
}

.toolbar button:hover,
.format-tab button:hover{
    background: var(--ui-btn-hover);
}

.editor{
      overflow:auto;
      resize:none;
      width:80vw;
      max-width:1000px;
      height:55vh;
      padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif;
      background-color:var(--ui-editor-bg);
      border:8px solid var(--ui-border);
      border-radius:20px;
      text-align:left;
      color:var(--ui-text);
      justify-self:center;
      align-self:center;
}

#download-button{
  position:fixed;
  bottom:10px;
  right:10px;
  padding:6px 10px;
  font-size:15px;
  border-radius:50%;
  background-color:var(--ui-btn-bg);
  color:var(--ui-text);
  border:1px solid var(--ui-border);
  cursor:pointer;
  box-shadow:0 0 10px var(--ui-shadow);
}

#download-button:hover{
    background: var(--ui-btn-hover);
}

#counter-box{
      text-align:left;
      justify-self:center;
      align-self:center;
      display:flex;
}

#word-counter{
      width:20vw;
      align-items:baseline;
      margin-top:5%;
      background-color:var(--ui-panel);
      color:var(--ui-text);
      text-align:center;
      margin-right:1vw;
      border:1px solid var(--ui-border);
}

#char-counter{
      width:20vw;
      align-items:baseline;
      margin-top:5%;
      background-color:var(--ui-panel);
      color:var(--ui-text);
      text-align:center;
      margin-left:1vw;
      border:1px solid var(--ui-border);
}

.font-control-bar{
      position:absolute;
      top:55%;
      right:0;
      transform:translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:30px;
      z-index:9999;
      padding:0;
}

.font-control-bar input[type="range"],
.font-control-bar input[type="color"]{
      writing-mode:vertical-lr;
      width:20px;
      height:4%px;
      cursor:pointer;
      border:none;
      outline:none;
}

.font-color-changer{
      border-radius:50%;
      width:20px;
      height:20px;
      border-style:none;
      margin:0;
      position:sticky;
}

.font-size-changer{
      transform:rotate(180deg);
}

.font-family{
      margin:2px;
      padding:3px;
      width:50%;
      background-color:var(--ui-panel);
      border:1px solid var(--ui-border);
      text-align:left;
      justify-self:center;
      align-self:center;
}

#fontFamily{
      width:100%;
      background-color:var(--ui-panel);
      color:var(--ui-text);
      border:none;
}


  @media (max-width: 800px) {
    .editor {
      width: 80vw;
      height: 50vh;
      border-radius: 10px;
    }
    #heading-container{
      font-size: xx-large;
    }
    
  }
  @media (max-width: 500px) {
    .editor {
      width: 80vw;
      height: 50vh;
      border-width: 5px;
      border-radius: 8px;
    }
    #heading-container{
      font-size: x-large;
    }
  }

   @media (max-width: 400px) {
    .editor {
      width: 80vw;
      height: 50vh;
      border-radius: 5px;
    }
    #heading-container{
      font-size: large;
    }
   }

   @media (max-width: 300px) {
    .editor {
      width: 80vw;
      height: 50vh;
      border-width: 2px;
      border: none;
      background-color: var(--ui-panel);
    }
    #heading-container{
      font-size: medium;
    }
   }
     @media (min-width: 768px) {
    .editor {
      width: 60vw;
      height: 50vh;
    }
  }


</style>
</head>
<body>

<div class="container">
    <div class="heading-container">
      <h1>Compact Text Editor</h1>
    </div>

<div class="format-tab" id="format-tab" title="Format Tab">
<div id="format-tab-title">Format Tab</div>
    <div class="format-options" id="format-options">
        <button type="button" onclick="format('b')" title="Bold"><b>B</b></button>
        <button type="button" onclick="format('i')" title="Italics"><i>I</i></button>
        <button type="button" onclick="format('u')" title="Underline"><u>U</u></button>
        <button type="button" onclick="format('s')" title="Strikethrough"><s>A</s></button>
        <button type="button" onclick="format('mark')" title="Mark"><mark>A</mark></button>
        <button type="button" onclick="format('code')" title="Code"><code>A</code></button>
        <button type="button" onclick="format('sup')" title="Supscript"><sup>A</sup></button>
        <button type="button" onclick="format('sub')" title="Subscript"><sub>A</sub></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">
    
</div>

<div class="toolbar" id="toolbar" title="Toolbar">
    <div class="toolbar-options" id="toolbar-options">
        <button type="button" onclick="rightAlign()" title="Right Align">➡️</button>
        <button type="button" onclick="leftAlign()" title="Left Align">⬅️</button>
        <button type="button" onclick="centerAlign()" title="Center Align">⬆️</button>
        <button type="button" onclick="justify()" title="Justify">⬇️</button>
        <button type="button" onclick="lineBreak()" title="Line Break">↩️</button>
        <button type="button" onclick="clearFormat()" title="Clear Formatting">✖️</button>
        <button type="button" onclick="clearEditor()" title="Clear Editor">❌</button>
        <button type="button" onclick="backSpaceFun()" title="Backspace">⌫</button>
    </div>
</div>

  <div class="font-family">
    <select title="Select font family" id="fontFamily">
      <option value="inherit">Default</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Verdana">Verdana</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="monospace">Monospace</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="fantasy">Fantasy</option>
      <option value="cursive">Cursive</option>
      <option value="gill-sans">Gill-sans</option>
    </select>
  </div>

<div id="counter-box">
    <input id="word-counter" placeholder="WORDS HERE" title="Word Counter" disabled />
    <input id="char-counter" placeholder="CHARCATERS HERE" title="Character Counter" disabled />
</div>

  <div class="font-control-bar">
    <input type="color" title="Font Color" class="font-color-changer" placeholder="Color" id="font-color-changer" />
    <input type="range" title="Font Size" class="font-size-changer" placeholder="Font Size" min="8" max="72" value="16" step="1" id="font-size-changer" />
  </div>

<button id="download-button" onclick="saveFile()" title="Download as HTML">💾</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/akpandey-dev/text-editor@main/src/script.js"></script>

</body>
</html>
